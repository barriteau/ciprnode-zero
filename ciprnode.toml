#: General system configuration

# Environment
# dev
# test
# prod
env = "dev"

# Log level
# 0: silent
# 1: operational
# 2: verbose
log_level = 0

# A 'true' value here writes the the same output of 'log_level = 2' to
# the logs files (ciprnode-*.log) in the /logs/ folder.
debug = false

#: Notifications configuration (optional)
[notifications]
# Global switch: set to false to disable all notifications
enabled = true

# Notification providers. Multiple can be active simultaneously.
# Supported values: "email"
providers = ["email"]

# Interval in milliseconds for periodic status digest (0 = disabled)
digest_interval = 3600000

# Per-event provider routing. Each event can go to one or more providers.
# Default if omitted: all events go to all configured providers.
[notifications.events]
startup_completed     = ["email"]
startup_failed        = ["email"]
self_validation_failed = ["email"]
node_added            = ["email"]
node_removed          = ["email"]
bootstrap_completed   = ["email"]
bootstrap_failed      = ["email"]
dns_updated           = ["email"]
rate_limit_hit        = ["email"]
periodic_digest       = ["email"]

# Email (SMTP) settings
[notifications.email]
smtp_host = "mail.runbox.com"
smtp_port = 587
smtp_user = "juan@barriteau.net"
# smtp_pass = "your_password"   # Use CIPR_SMTP_PASS env var
smtp_from = "ciprnode@cipr.info"
smtp_to   = "juan@barriteau.net"

#! SECURITY NOTE: Use environment variables for secrets:
#! CIPR_SMTP_PASS="your_password"

#: The actual data of the resource in the Cipr, what goes to the Cipr, what identifies your resources
[cipr_entry]

# The Zone Apex for this resource:
za = "barriteau.net"

# The title of the resource to index, max 64 characters
title = "Juan Barriteau"

# A brief description of the resource, max 256 characters
description = "Web personal y publicaciones de Juan Barriteau"

# Space separated list of keywords, max 512 characters, case insensitive. Alternatively, keywords
# can be provided as an array of strings: keywords = ["project", "top", "network", "infrastructure"]
keywords = "juan barriteau yelema crónica torbí torbia estado liberalismo libertarianismo anarquismo comunismo capitalismo socialismo"

# What is offered or shared through your resource. This includes, but is not restricted to, tangible products, professional or casual
# services, expertise, personal skills, attributes, qualities and traits that others might find valuable, interesting or attractive.
offering = "Software development services, Spanish lessons"

# What you are looking for or who you want to connect with. This could be specific items, a helping hand, someone
# with a particular skill set or specific characteristics from collaborators, personal or professional connections.
seeking = ""

# Primary language of the resource, the main one, leave it empty if the resource is universally accesible.
primary_lang = "es"

# Offensiveness Level of the resource
# 0: Non offensive content
# 1: Individual offensive content
# 2: Collectively offensive content
# 3: Universally offensive content
ol = 0

# Geographical coordinates in WGS 84 (EPSG:4326) format multiplied by 10000000 to obtain an
# integer value. Any precision level allowed. Use 0 if geolocation is irrelevant for the resource.
latitude = 105055430
longitude = -668990110
#latitude = 105444722
#longitude = -667867138

#: Internal Search Engine (ISE) Providers (optional)
# These represent external APIs used for executing `QUERY /ri/` equivalent searches.
# You can define multiple `[[ise_provider]]` chunks for different search domains.
[[ise_provider]]
name = "pagefind"
url = "https://cgt.barriteau.net/"

[[ise_provider]]
name = "pagefind"
url = "https://juan.barriteau.net/"

#: Extra metadata for the ciprface. It is not part of the indexed data, this just makes the ciprnode easier to find on the web.
[meta_data]

# Full name of the author/owner of the site
author = "Juan Barriteau"

# URL of an author page or profile (used in rel="author" link and DC.Creator)
author_url = "https://juan.barriteau.net/"

# Topic / subject summary of the site (used in meta[name=topic] and DC.Subject)
subject = "Web personal y publicaciones de Juan Barriteau"

# Publisher name (DC.Publisher)
publisher = "Juan Barriteau"

# Contributor(s) (DC.Contributor, comma-separated if multiple)
# contributor = ""

# DC.Identifier: ISBN, DOI, or other formal identifier (optional)
# isbn = ""

# DC.Coverage: spatial/temporal coverage description (optional)
# coverage = ""


# License/rights short label (used in rel="license" link title)
rights = "CC BY 4.0"

# URL to the rights / license document (used in meta[name=DC.Rights] and rel="license")
rights_url = "https://creativecommons.org/licenses/by/4.0/"

# Date after which the page should be considered unavailable (RFC 7231 HTTP-date format)
# unavailable_after = "31 Dec 2099 23:59:59 GMT"

#: Front-end related configuration
[ciprface]

# Number of items per page
page_size = 10

#: Network related configuration
[network]

# A ciprnode listens only in the port 443, change this
# value only for testing purposes or if you are behind a proxy
# port = 443
port = 8446

# Trusted bootstrap ciprnodes to start syncing from
bootstrap_nodes = [
  "https://ciprnode.cipr.info",
  "https://ciprnode.barriteau.net",
  "https://ciprnode.guasa.art"
]

# Leech mode ***NOT IMPLEMENTED YET***: if not null, this ciprnode won't start and instead will
# create a CNAME record in the DNS for the za pointing to the host of leech_from.
# If the subdomain 'ciprnode' is omitted, it will be added automatically.
# leech_from = "ciprnode.cipr.info"
# leech_from = "cipr.info"

# Expected time in milliseconds for a new or updated entry to infect the whole Cipr
# Recommended: 480000 if the Cipr is already well populated
expected_propagation_time = 120000

# A list of arbitrary words, not related with the keywords of your resource, used to
# check the reliability of the ciprnodes in the Cipr. Use all languages you want, use
# phrases or not, keep it shorter than 512 characters.
test_words = "dog el perro the casa amigo friend árboles social pero como su se tu madera audio carpet wok farm de los in for caballo en la castaña esto eso all"

