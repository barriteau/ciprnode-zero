#: Automated DNS Record Management (optional)
[dns_provider]
# If a new configuration for this Cipr entry is detected, the
# ciprnode can automatically update your DNS records for certain providers.
# Supported values: "cloudflare", "desec"

#! SECURITY NOTE: It is recommended to use the CIPR_DNS_API_TOKEN environment variable
#! instead of hardcoding your token here, especially if committing to Git.

# Environment Variables will have precedence over the values in this file.
# CIPR_DNS_PROVIDER="desec"
# CIPR_DNS_API_TOKEN="your_token"
# CIPR_DNS_ZONE_ID="yourdomain.com"

#: Cloudflare Provider
name = "cloudflare"
api_token = "YOUR_TOKEN_HERE"

#: deSEC.io Provider
# name = "desec"
# api_token = "YOUR_DESEC_TOKEN"
# zone_id = "yourdomain.com" (The domain name registered in deSEC)
