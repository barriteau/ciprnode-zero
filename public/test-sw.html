<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SW Test</title>
</head>
<body>
    <h1>Service Worker Test</h1>
    <pre id="log" style="background:#eee;padding:1rem;height:300px;overflow:auto;"></pre>

    <script>
      const log = (msg) => {
          document.getElementById('log').innerHTML += msg + '\n';
      };

      if ('serviceWorker' in navigator) {
        log('Service Worker is supported in this browser.');
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              log('ServiceWorker registration successful with scope: ' + registration.scope);
            })
            .catch((error) => {
              log('ServiceWorker registration failed: ' + error.message);
              console.error(error);
            });
        });
      } else {
        log('Service Worker is NOT supported (or blocked by security context).');
      }
    </script>
</body>
</html>
